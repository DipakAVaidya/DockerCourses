name: Docker Course CI

on:
  push:
    branches: [ main ]

jobs:
  hello-docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install & Test
      working-directory: ./hello-docker
      run: |
        npm install
        npm test

  vite-project:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install & Build
      working-directory: ./vite-project
      run: |
        npm install
        npm run build

  react-docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install & Build
      working-directory: ./react-docker
      run: |
        npm install
        npm run build
    - name: Build Docker image
      working-directory: ./react-docker
      run: docker build -t react-docker .

  mern-docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install backend
      working-directory: ./mern-docker/backend
      run: npm install
    - name: Install frontend
      working-directory: ./mern-docker/frontend
      run: npm install
    - name: Build Docker images
      working-directory: ./mern-docker
      run: docker compose build